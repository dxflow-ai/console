name: ✨ Feature Request
description: Suggest an improvement to the dxflow console (web UI).
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
    - type: markdown
      attributes:
          value: |
              Thanks for the idea! This tracker is for the **console (web UI)** only.
    - type: checkboxes
      id: preflight
      attributes:
          label: Before you start
          options:
              - label: I have searched the [existing issues](https://github.com/dxflow-ai/console/issues) and this hasn't been requested yet.
                required: true
    - type: dropdown
      id: area
      attributes:
          label: Feature area
          description: Which part of the console would this affect?
          options:
              - Engine overview / monitoring
              - Workflows
              - Artifacts / file browser
              - Shell / terminal sessions
              - Accounts
              - Authentication / sign-in
              - Licensing
              - Navigation / layout / general UI
              - Other / not sure
      validations:
          required: true
    - type: textarea
      id: problem
      attributes:
          label: Problem / motivation
          description: What problem are you trying to solve? Is your request related to a frustration or limitation?
          placeholder: "I'm always frustrated when ..."
      validations:
          required: true
    - type: textarea
      id: solution
      attributes:
          label: Proposed solution
          description: A clear and concise description of what you want to happen.
      validations:
          required: true
    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Any alternative solutions or workarounds you've considered.
      validations:
          required: false
    - type: textarea
      id: context
      attributes:
          label: Additional context
          description: Add any other context, mockups, or screenshots about the request here.
      validations:
          required: false
